services:
  - type: web
    name: uniqbd-backend
    runtime: node
    rootDir: uniqbd/serverFolder
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,https://uniqbd-nextjs-updateversion.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: JSON_WEB_TOKEN_SECRET_KEY
        sync: false
      - key: SECRET_KEY_ACCESS_TOKEN
        sync: false
      - key: SECRET_KEY_REFRESH_TOKEN
        sync: false

  - type: web
    name: uniqbd-frontend
    runtime: node
    rootDir: uniqbd/clientFolder
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://uniqbd-nextjs-updateversion-backend.onrender.com
